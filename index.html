<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ Collective</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #161616;
      --accent: #e8ff00;
      --accent2: #ff3c00;
      --text: #f0f0f0;
      --muted: #666;
      --border: #222;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page { display: none; }
    .page.active { display: block; }

    /* HEADER */
    .site-header {
      position: relative;
      padding: 80px 40px 60px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .site-header::before {
      content: '';
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 300px;
      background: radial-gradient(ellipse, rgba(232,255,0,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-label {
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .site-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 12vw, 140px);
      line-height: 0.9;
      letter-spacing: 4px;
    }
    .site-header h1 span { color: var(--accent); }
    .site-header p { margin-top: 20px; color: var(--muted); font-size: 15px; font-weight: 300; }

    /* DJ GRID */
    .dj-grid {
      max-width: 960px;
      margin: 0 auto;
      padding: 60px 24px 100px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2px;
    }

    .dj-card {
      background: var(--card);
      border: 1px solid var(--border);
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .dj-card:hover { border-color: var(--accent); }

    .dj-photo {
      width: 100%;
      aspect-ratio: 4/3;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .dj-photo img { width: 100%; height: 100%; object-fit: cover; }
    .photo-placeholder {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .photo-placeholder svg { width: 36px; height: 36px; stroke: #333; }
    .photo-placeholder span { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #333; }

    .dj-card-body { padding: 22px 26px 26px; }
    .dj-num { font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 4px; color: var(--accent); margin-bottom: 4px; }
    .dj-card-body h2 { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 2px; margin-bottom: 6px; }
    .dj-genre { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent2); margin-bottom: 10px; }
    .dj-bio-short { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
    .dj-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 18px; }
    .tag { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 9px; border: 1px solid #2a2a2a; color: #777; border-radius: 2px; }

    .open-btn {
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--accent); background: none; border: none; cursor: pointer; padding: 0;
      transition: gap 0.2s;
    }
    .open-btn:hover { gap: 11px; }
    .open-btn svg { width: 14px; height: 14px; stroke: var(--accent); }

    /* DETAIL HEADER */
    .detail-nav {
      display: flex; align-items: center; gap: 16px;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      display: flex; align-items: center; gap: 8px;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
      transition: color 0.2s; padding: 0;
    }
    .back-btn:hover { color: var(--accent); }
    .back-btn svg { width: 16px; height: 16px; stroke: currentColor; }
    .breadcrumb { font-size: 12px; color: #333; }
    .breadcrumb span { color: #555; }

    /* DETAIL BODY */
    .detail-body {
      max-width: 960px;
      margin: 0 auto;
      padding: 56px 24px 100px;
    }

    .detail-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      margin-bottom: 56px;
      align-items: start;
    }

    /* PHOTO GRID */
    .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
    .photo-grid .photo-main { grid-column: 1 / -1; }

    .photo-slot {
      background: #141414;
      border: 1px dashed #2a2a2a;
      aspect-ratio: 4/3;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; cursor: pointer; transition: border-color 0.2s; overflow: hidden;
      position: relative;
    }
    .photo-slot:hover { border-color: #444; }
    .photo-slot svg { width: 26px; height: 26px; stroke: #333; }
    .photo-slot span { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #333; }
    .photo-slot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .photo-slot input[type=file] { display: none; }

    /* DETAIL INFO */
    .detail-info {}
    .detail-info .dj-num { font-size: 12px; letter-spacing: 4px; margin-bottom: 6px; }
    .detail-info h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 6vw, 64px);
      letter-spacing: 3px; line-height: 0.9;
      margin-bottom: 10px;
    }
    .detail-genre { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent2); margin-bottom: 20px; }
    .detail-bio { font-size: 15px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }

    .booking-block { margin-top: 28px; padding-top: 28px; border-top: 1px solid var(--border); }
    .booking-block h3 { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .booking-block p { font-size: 12px; color: #555; margin-bottom: 16px; }

    .booking-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 28px;
      background: var(--accent); color: #000;
      font-size: 12px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
      text-decoration: none; border: none; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .booking-btn:hover { background: #fff; transform: translateY(-1px); }

    /* CONTACT GRID */
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0;
      border: 1px solid var(--border);
      background: var(--card);
    }
    .contact-col {
      padding: 28px 32px;
      border-right: 1px solid var(--border);
    }
    .contact-col:last-child { border-right: none; }
    .contact-col h3 { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }

    .contact-item {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px; color: var(--text); font-size: 14px;
      text-decoration: none; transition: color 0.2s;
    }
    .contact-item:hover { color: var(--accent); }
    .contact-item svg { width: 15px; height: 15px; stroke: var(--muted); flex-shrink: 0; transition: stroke 0.2s; }
    .contact-item:hover svg { stroke: var(--accent); }

    footer {
      text-align: center; padding: 40px;
      border-top: 1px solid var(--border);
      font-size: 12px; color: var(--muted); letter-spacing: 1px;
    }

    @media (max-width: 640px) {
      .detail-top { grid-template-columns: 1fr; gap: 32px; }
      .detail-nav { padding: 16px 20px; }
      .detail-body { padding: 36px 16px 80px; }
      .contact-col { border-right: none; border-bottom: 1px solid var(--border); }
      .contact-col:last-child { border-bottom: none; }
      .site-header { padding: 50px 20px 40px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════
     HOME PAGE
═══════════════════════════════════════ -->
<div class="page active" id="page-home">
  <header class="site-header">
    <p class="header-label">Het collectief</p>
    <h1>DJ<span>LINE</span>UP</h1>
    <p>Klik op een DJ voor meer info & booking</p>
  </header>

  <main class="dj-grid" id="dj-grid"></main>

  <footer>DJ Collective &copy; 2026 &mdash; Alle rechten voorbehouden</footer>
</div>

<!-- ═══════════════════════════════════════
     DETAIL PAGE
═══════════════════════════════════════ -->
<div class="page" id="page-detail">
  <nav class="detail-nav">
    <button class="back-btn" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
      Terug
    </button>
    <span class="breadcrumb">Lineup / <span id="breadcrumb-name"></span></span>
  </nav>

  <div class="detail-body" id="detail-content"></div>

  <footer>DJ Collective &copy; 2026 &mdash; Alle rechten voorbehouden</footer>
</div>

<script>
  const djs = [
    {
      id: 'ewowo',
      number: '01',
      name: 'EWOWO',
      genre: 'Drum & Bass · Trance · Commercieel',
      bio: 'Veelzijdig DJ met een scherp gevoel voor energie. Van zware drum & bass tot euforische trance en catchy commerciële bangers — ewowo houdt elke zaal in zijn greep.',
      tags: ['Club', 'Festival', 'Allrounder'],
      email: 'booking@ewowo.nl',
      phone: '+31 6 12 34 56 78',
      instagram: '@ewowo',
      soundcloud: 'ewowo',
      bookingInfo: 'Fee op aanvraag · Min. 2 uur',
      photos: [null, null, null]
    },
    {
      id: 'jibbe',
      number: '02',
      name: 'JIBBE',
      genre: 'Trance · UKG',
      bio: 'Meester in de mix van euforische trance en strakke UK garage. Jibbe brengt een unieke sound die de dansvloer van begin tot eind beweegt.',
      tags: ['Club', 'Trance', 'UKG'],
      email: 'booking@jibbe.nl',
      phone: '+31 6 98 76 54 32',
      instagram: '@jibbe.dj',
      soundcloud: 'jibbe',
      bookingInfo: 'Beschikbaar NL & BE · 2–4 uur',
      photos: [null, null, null]
    },
    {
      id: 'ewibbe',
      number: '03',
      name: 'EWIBBE',
      genre: 'B2B · Drum & Bass · Trance · UKG · Commercieel',
      bio: 'Ewowo & Jibbe samen op de decks. Als duo combineren ze hun volledige repertoire — drum & bass, trance, UKG en commercieel — voor een onvergetelijke b2b set.',
      tags: ['B2B', 'Festival', 'Club'],
      email: 'booking@ewibbe.nl',
      phone: '+31 6 55 44 33 22',
      instagram: '@ewibbe',
      soundcloud: 'ewibbe',
      bookingInfo: 'Ewowo × Jibbe · B2B',
      photos: [null, null, null]
    }
  ];

  // SVG icons
  const iMail = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 4 10 9 10-9"/></svg>`;
  const iPhone = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.7 12.14 19.79 19.79 0 0 1 1.63 3.56 2 2 0 0 1 3.6 1.37h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6.09 6.09l.91-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`;
  const iIG = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>`;
  const iSC = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M21 2H3l7 9.46V19l4 2v-9.54L21 2z"/></svg>`;
  const iPhoto = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M9 5V3h6v2"/></svg>`;

  function photoSlotHTML(djId, index, isMain) {
    const dj = djs.find(d => d.id === djId);
    const photo = dj.photos[index];
    return `
      <div class="photo-slot${isMain ? ' photo-main' : ''}" onclick="triggerUpload('${djId}', ${index})">
        ${photo
          ? `<img src="${photo}" alt="Foto ${index + 1}">`
          : `${iPhoto}<span>${isMain ? 'Hoofdfoto' : 'Foto ' + (index + 1)}</span>`
        }
        <input type="file" accept="image/*" id="file-${djId}-${index}" onchange="handlePhoto('${djId}', ${index}, event)">
      </div>`;
  }

  function renderGrid() {
    document.getElementById('dj-grid').innerHTML = djs.map(dj => `
      <div class="dj-card" onclick="openDJ('${dj.id}')">
        <div class="dj-photo">
          ${dj.photos[0]
            ? `<img src="${dj.photos[0]}" alt="${dj.name}">`
            : `<div class="photo-placeholder">${iPhoto}<span>Foto</span></div>`
          }
        </div>
        <div class="dj-card-body">
          <div class="dj-num">${dj.number}</div>
          <h2>${dj.name}</h2>
          <div class="dj-genre">${dj.genre}</div>
          <p class="dj-bio-short">${dj.bio}</p>
          <div class="dj-tags">${dj.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          <button class="open-btn">
            Bekijk profiel
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    `).join('');
  }

  function renderDetail(id) {
    const dj = djs.find(d => d.id === id);
    document.getElementById('breadcrumb-name').textContent = dj.name;
    document.getElementById('detail-content').innerHTML = `
      <div class="detail-top">
        <div class="photo-grid">
          ${photoSlotHTML(dj.id, 0, true)}
          ${photoSlotHTML(dj.id, 1, false)}
          ${photoSlotHTML(dj.id, 2, false)}
        </div>
        <div class="detail-info">
          <div class="dj-num">${dj.number}</div>
          <h2>${dj.name}</h2>
          <div class="detail-genre">${dj.genre}</div>
          <p class="detail-bio">${dj.bio}</p>
          <div class="dj-tags">${dj.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          <div class="booking-block">
            <h3>Booking</h3>
            <p>${dj.bookingInfo}</p>
            <a class="booking-btn" href="mailto:${dj.email}">Boek nu →</a>
          </div>
        </div>
      </div>

      <div class="contact-grid">
        <div class="contact-col">
          <h3>Contact</h3>
          <a class="contact-item" href="mailto:${dj.email}">${iMail} ${dj.email}</a>
          <a class="contact-item" href="tel:${dj.phone.replace(/\s/g,'')}">${iPhone} ${dj.phone}</a>
        </div>
        <div class="contact-col">
          <h3>Socials</h3>
          <a class="contact-item" href="#">${iIG} ${dj.instagram}</a>
          <a class="contact-item" href="#">${iSC} SoundCloud: ${dj.soundcloud}</a>
        </div>
      </div>
    `;
  }

  function openDJ(id) {
    renderDetail(id);
    document.getElementById('page-home').classList.remove('active');
    document.getElementById('page-detail').classList.add('active');
    window.scrollTo(0, 0);
  }

  function goHome() {
    document.getElementById('page-detail').classList.remove('active');
    document.getElementById('page-home').classList.add('active');
    window.scrollTo(0, 0);
  }

  function triggerUpload(djId, index) {
    document.getElementById(`file-${djId}-${index}`).click();
  }

  function handlePhoto(djId, index, event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const dj = djs.find(d => d.id === djId);
      dj.photos[index] = e.target.result;
      renderDetail(djId);
      renderGrid();
    };
    reader.readAsDataURL(file);
  }

  renderGrid();
</script>

</body>
</html>
