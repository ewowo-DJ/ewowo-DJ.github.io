<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ Collective</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #161616;
      --accent: #e8ff00;
      --accent2: #ff3c00;
      --text: #f0f0f0;
      --muted: #666;
      --border: #222;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page { display: none; }
    .page.active { display: block; }

    #loader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 999;
      transition: opacity 0.4s;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .loader-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 6px; color: var(--text); }
    .loader-title span { color: var(--accent); }
    .loader-bar { width: 200px; height: 1px; background: var(--border); position: relative; overflow: hidden; }
    .loader-bar::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: var(--accent);
      animation: slide 1.2s ease-in-out infinite;
    }
    @keyframes slide { 0% { left: -100%; } 100% { left: 100%; } }
    .loader-text { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); }

    /* WACHTWOORD KNOP */
    #admin-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 998;
      width: 36px;
      height: 36px;
      background: rgba(10,10,10,0.8);
      border: 1px solid #2a2a2a;
      border-radius: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s;
    }
    #admin-btn:hover { border-color: #444; }
    #admin-btn.unlocked { border-color: var(--accent); }
    #admin-btn svg { width: 14px; height: 14px; stroke: #444; transition: stroke 0.2s; }
    #admin-btn.unlocked svg { stroke: var(--accent); }

    /* WACHTWOORD POPUP */
    #admin-popup {
      position: fixed;
      bottom: 66px;
      left: 20px;
      z-index: 998;
      background: #111;
      border: 1px solid var(--border);
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 10px;
      width: 220px;
    }
    #admin-popup.visible { display: flex; }
    #admin-popup p { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    #admin-popup input {
      background: #0a0a0a;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      width: 100%;
    }
    #admin-popup input:focus { border-color: var(--accent); }
    #admin-popup button {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 8px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      font-weight: 500;
    }
    #admin-popup button:hover { background: #fff; }
    #admin-popup .error { color: var(--accent2); font-size: 11px; display: none; }
    #admin-popup .error.visible { display: block; }

    .site-header {
      position: relative;
      padding: 80px 40px 60px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; opacity: 0.35; }
    .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(10,10,10,0.4) 0%, rgba(10,10,10,0.7) 100%); z-index: 1; }

    .hero-upload-zone {
      position: absolute;
      inset: 0;
      z-index: 2;
      cursor: default;
    }
    .hero-upload-zone.admin { cursor: pointer; }
    .hero-upload-zone.admin:hover::after {
      content: 'Achtergrond wijzigen';
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.7);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 14px;
    }

    .hero-content { position: relative; z-index: 3; pointer-events: none; }
    .header-label { font-size: 11px; letter-spacing: 6px; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
    .site-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(64px, 12vw, 140px); line-height: 0.9; letter-spacing: 4px; }
    .site-header h1 span { color: var(--accent); }
    .site-header p { margin-top: 20px; color: var(--muted); font-size: 15px; font-weight: 300; }

    .dj-grid {
      max-width: 960px;
      margin: 0 auto;
      padding: 60px 24px 100px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2px;
    }

    .dj-card { background: var(--card); border: 1px solid var(--border); cursor: pointer; overflow: hidden; transition: border-color 0.2s; }
    .dj-card:hover { border-color: var(--accent); }

    .dj-photo { width: 100%; aspect-ratio: 4/3; background: #1a1a1a; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .dj-photo img { width: 100%; height: 100%; object-fit: cover; }
    .photo-placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .photo-placeholder svg { width: 36px; height: 36px; stroke: #333; }
    .photo-placeholder span { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #333; }

    .dj-card-body { padding: 22px 26px 26px; }
    .dj-num { font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 4px; color: var(--accent); margin-bottom: 4px; }
    .dj-card-body h2 { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 2px; margin-bottom: 6px; }
    .dj-genre { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent2); margin-bottom: 10px; }
    .dj-bio-short { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
    .dj-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 18px; }
    .tag { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 9px; border: 1px solid #2a2a2a; color: #777; border-radius: 2px; }

    .open-btn { display: flex; align-items: center; gap: 7px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; transition: gap 0.2s; }
    .open-btn:hover { gap: 11px; }
    .open-btn svg { width: 14px; height: 14px; stroke: var(--accent); }

    .detail-nav { display: flex; align-items: center; gap: 16px; padding: 20px 40px; border-bottom: 1px solid var(--border); }
    .back-btn { display: flex; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; color: var(--muted); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; transition: color 0.2s; padding: 0; }
    .back-btn:hover { color: var(--accent); }
    .back-btn svg { width: 16px; height: 16px; stroke: currentColor; }
    .breadcrumb { font-size: 12px; color: #333; }
    .breadcrumb span { color: #555; }

    .detail-body { max-width: 960px; margin: 0 auto; padding: 56px 24px 100px; }
    .detail-top { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; margin-bottom: 56px; align-items: start; }

    .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
    .photo-grid .photo-main { grid-column: 1 / -1; }

    .photo-slot {
      background: #141414;
      border: 1px dashed #2a2a2a;
      aspect-ratio: 4/3;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; overflow: hidden; position: relative;
      transition: border-color 0.2s;
    }
    .photo-slot.admin { cursor: pointer; }
    .photo-slot.admin:hover { border-color: #444; }
    .photo-slot svg { width: 26px; height: 26px; stroke: #333; }
    .photo-slot span { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #333; }
    .photo-slot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .photo-slot input[type=file] { display: none; }

    /* Upload knop overlay op foto — alleen zichtbaar in admin mode */
    .photo-slot .upload-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 1;
      transition: background 0.2s;
    }
    .photo-slot.admin .upload-overlay { display: block; }
    .photo-slot.admin:hover .upload-overlay { background: rgba(0,0,0,0.3); }
    .photo-slot.admin:hover .upload-overlay::after {
      content: 'Foto wijzigen';
      position: absolute;
      bottom: 10px; left: 50%; transform: translateX(-50%);
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--accent); white-space: nowrap;
    }

    .uploading-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); z-index: 2; }

    .detail-info .dj-num { font-size: 12px; letter-spacing: 4px; margin-bottom: 6px; }
    .detail-info h2 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(42px, 6vw, 64px); letter-spacing: 3px; line-height: 0.9; margin-bottom: 10px; }
    .detail-genre { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent2); margin-bottom: 20px; }
    .detail-bio { font-size: 15px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }

    .booking-block { margin-top: 28px; padding-top: 28px; border-top: 1px solid var(--border); }
    .booking-block h3 { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .booking-block p { font-size: 12px; color: #555; margin-bottom: 16px; }

    .booking-btn { display: inline-flex; align-items: center; gap: 8px; padding: 13px 28px; background: var(--accent); color: #000; font-size: 12px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; border: none; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .booking-btn:hover { background: #fff; transform: translateY(-1px); }

    .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0; border: 1px solid var(--border); background: var(--card); }
    .contact-col { padding: 28px 32px; border-right: 1px solid var(--border); }
    .contact-col:last-child { border-right: none; }
    .contact-col h3 { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }

    .contact-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; color: var(--text); font-size: 14px; text-decoration: none; transition: color 0.2s; }
    .contact-item:hover { color: var(--accent); }
    .contact-item svg { width: 15px; height: 15px; stroke: var(--muted); flex-shrink: 0; transition: stroke 0.2s; }
    .contact-item:hover svg { stroke: var(--accent); }

    .gallery-section { margin-top: 48px; border: 1px solid var(--border); background: var(--card); overflow: hidden; }
    .gallery-toggle { display: flex; align-items: center; justify-content: space-between; padding: 24px 32px; cursor: pointer; user-select: none; transition: background 0.2s; }
    .gallery-toggle:hover { background: #1a1a1a; }
    .gallery-toggle-left { display: flex; align-items: center; gap: 16px; }
    .gallery-toggle h3 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--text); }
    .gallery-toggle span { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .gallery-toggle-btn { width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 2px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s; }
    .gallery-toggle-btn svg { transition: transform 0.3s; stroke: var(--muted); }
    .gallery-section.open .gallery-toggle-btn { background: var(--accent); border-color: var(--accent); }
    .gallery-section.open .gallery-toggle-btn svg { transform: rotate(45deg); stroke: #000; }
    .gallery-panel { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .gallery-section.open .gallery-panel { max-height: 1000px; }
    .gallery-inner { border-top: 1px solid var(--border); padding: 24px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }

    .gallery-slot {
      background: #141414;
      border: 1px dashed #2a2a2a;
      aspect-ratio: 4/3;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; overflow: hidden; position: relative;
      transition: border-color 0.2s;
    }
    .gallery-slot.admin { cursor: pointer; }
    .gallery-slot.admin:hover { border-color: #444; }
    .gallery-slot svg { width: 22px; height: 22px; stroke: #333; }
    .gallery-slot span { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #333; }
    .gallery-slot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .gallery-slot input[type=file] { display: none; }

    .gallery-slot .upload-overlay {
      display: none;
      position: absolute; inset: 0;
      background: rgba(0,0,0,0);
      z-index: 1;
      transition: background 0.2s;
    }
    .gallery-slot.admin .upload-overlay { display: block; }
    .gallery-slot.admin:hover .upload-overlay { background: rgba(0,0,0,0.3); }
    .gallery-slot.admin:hover .upload-overlay::after {
      content: 'Foto wijzigen';
      position: absolute;
      bottom: 8px; left: 50%; transform: translateX(-50%);
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--accent); white-space: nowrap;
    }

    footer { text-align: center; padding: 40px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); letter-spacing: 1px; }

    @media (max-width: 640px) {
      .detail-top { grid-template-columns: 1fr; gap: 32px; }
      .detail-nav { padding: 16px 20px; }
      .detail-body { padding: 36px 16px 80px; }
      .contact-col { border-right: none; border-bottom: 1px solid var(--border); }
      .contact-col:last-child { border-bottom: none; }
      .site-header { padding: 50px 20px 40px; min-height: 260px; }
      .gallery-inner { grid-template-columns: repeat(2, 1fr); padding: 16px; }
      .gallery-toggle { padding: 18px 20px; }
    }
  </style>
</head>
<body>

<div id="loader">
  <div class="loader-title">DJ<span>LINE</span>UP</div>
  <div class="loader-bar"></div>
  <div class="loader-text">Laden...</div>
</div>

<!-- ADMIN KNOP -->
<button id="admin-btn" onclick="toggleAdminPopup()" title="Beheer">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
</button>

<!-- WACHTWOORD POPUP -->
<div id="admin-popup">
  <p>Beheerder</p>
  <input type="password" id="admin-input" placeholder="Wachtwoord" onkeydown="if(event.key==='Enter') submitWachtwoord()">
  <button onclick="submitWachtwoord()">Inloggen</button>
  <span class="error" id="admin-error">Incorrect wachtwoord</span>
</div>

<div class="page active" id="page-home">
  <header class="site-header">
    <img class="hero-bg" id="hero-img" src="" alt="" style="display:none;">
    <div class="hero-overlay"></div>
    <div class="hero-upload-zone" id="hero-zone" onclick="handleHeroZoneClick()"></div>
    <div class="hero-content">
      <p class="header-label">dj collectief</p>
      <h1>DJ<span>COLLECT</span>IEF</h1>
      <p>Klik op een DJ voor meer info & booking</p>
    </div>
    <input type="file" accept="image/*" id="hero-file" style="display:none;" onchange="handleHeroUpload(event)">
  </header>
  <main class="dj-grid" id="dj-grid"></main>
  <footer>DJ Collective &copy; 2026 &mdash; Alle rechten voorbehouden</footer>
</div>

<div class="page" id="page-detail">
  <nav class="detail-nav">
    <button class="back-btn" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
      Terug
    </button>
    <span class="breadcrumb">Lineup / <span id="breadcrumb-name"></span></span>
  </nav>
  <div class="detail-body" id="detail-content"></div>
  <footer>DJ collectief &copy; 2026 &mdash; Alle rechten voorbehouden</footer>
</div>

<script>
  const CLOUDINARY_CLOUD = 'devasysdf';
  const CLOUDINARY_PRESET = 'ml_default';
  const JSONBIN_KEY = '$2a$10$nXdyz2jtRp4nLWIBc6N.EeYx9LRkI5cn8KKMZjEfZ9VlJsI5p8BDq';
  const JSONBIN_URL = 'https://api.jsonbin.io/v3/b';
  const BIN_ID = '6a049914c0954111d81a8e08';
  const UPLOAD_WACHTWOORD = 'ewibbe2026';
  let adminUnlocked = false;
  let heroPhoto = null;
  let currentDJId = null;

  const djs = [
    {
      id: 'ewowo', number: '01', name: 'EWOWO',
      genre: 'Drum & Bass · Trance · Commercieel',
      bio: 'Veelzijdig DJ met een scherp gevoel voor energie. Van drum & bass tot trance en catchy commerciële bangers, ewowo fixt het wel.',
      tags: ['Sfeer', 'Energie', 'Allrounder'],
      email: 'ewowo@outlook.be', phone: '+32 4 73 61 15 57',
      instagram: 'https://www.instagram.com/_ewowo_/', soundcloud: 'https://on.soundcloud.com/sQtB0GjS7Kr9vGxplJ',
      bookingInfo: 'Fee op aanvraag',
      photos: ['https://res.cloudinary.com/devasysdf/image/upload/f_auto,q_auto/lkVfIuJk_ngwkq5', null, null],
      gallery: [null, null, null, null, null, null]
    },
    {
      id: 'jibbe', number: '02', name: 'JIBBE',
      genre: 'Trance · UKG',
      bio: 'Meester in de mix van euforische trance en strakke UK garage. Jibbe brengt een unieke sound die de dansvloer van begin tot eind beweegt.',
      tags: ['Energie', 'Vibes', 'Party'],
      email: '*******@******.**', phone: '+32 * ** ** ** **',
      instagram: '@jibbe.dj', soundcloud: 'jibbe',
      bookingInfo: 'Fee op aanvraag',
      photos: [null, null, null],
      gallery: [null, null, null, null, null, null]
    },
    {
      id: 'ewibbe', number: 'B2B', name: 'EWIBBE',
      genre: 'B2B · Drum & Bass · Trance · UKG · Commercieel',
      bio: 'Ewowo & Jibbe samen op de decks. Als duo combineren ze hun volledige repertoire — drum & bass, trance, UKG en commercieel — voor een onvergetelijke b2b set.',
      tags: ['B2B', 'Vibes', 'Party'],
      email: '*****@*****.**', phone: '+32 4 73 61 15 57',
      instagram: '@ewibbe', soundcloud: 'ewibbe',
      bookingInfo: 'Fee op aanvraag',
      photos: [null, null, null],
      gallery: [null, null, null, null, null, null]
    }
  ];

  // ADMIN
  function toggleAdminPopup() {
    if (adminUnlocked) {
      adminUnlocked = false;
      document.getElementById('admin-btn').classList.remove('unlocked');
      document.getElementById('admin-popup').classList.remove('visible');
      if (currentDJId) renderDetail(currentDJId);
      renderGrid();
      updateHeroZone();
      return;
    }
    const popup = document.getElementById('admin-popup');
    popup.classList.toggle('visible');
    if (popup.classList.contains('visible')) {
      setTimeout(() => document.getElementById('admin-input').focus(), 50);
    }
  }

  function submitWachtwoord() {
    const val = document.getElementById('admin-input').value;
    const err = document.getElementById('admin-error');
    if (val === UPLOAD_WACHTWOORD) {
      adminUnlocked = true;
      document.getElementById('admin-btn').classList.add('unlocked');
      document.getElementById('admin-popup').classList.remove('visible');
      document.getElementById('admin-input').value = '';
      err.classList.remove('visible');
      if (currentDJId) renderDetail(currentDJId);
      renderGrid();
      updateHeroZone();
    } else {
      err.classList.add('visible');
      document.getElementById('admin-input').value = '';
    }
  }

  function updateHeroZone() {
    const zone = document.getElementById('hero-zone');
    if (adminUnlocked) {
      zone.classList.add('admin');
    } else {
      zone.classList.remove('admin');
    }
  }

  function handleHeroZoneClick() {
    if (!adminUnlocked) return;
    document.getElementById('hero-file').click();
  }

  function updateHeroImage() {
    const img = document.getElementById('hero-img');
    if (heroPhoto) { img.src = heroPhoto; img.style.display = 'block'; }
    else { img.style.display = 'none'; }
  }

  async function saveToJsonbin() {
    const data = { hero: heroPhoto };
    djs.forEach(dj => { data[dj.id] = { photos: dj.photos, gallery: dj.gallery }; });
    await fetch(`${JSONBIN_URL}/${BIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
      body: JSON.stringify(data)
    });
  }

  async function loadFromJsonbin() {
    try {
      const res = await fetch(`${JSONBIN_URL}/${BIN_ID}/latest`, {
        headers: { 'X-Master-Key': JSONBIN_KEY }
      });
      const json = await res.json();
      const data = json.record;
      if (data.hero) heroPhoto = data.hero;
      djs.forEach(dj => {
        if (data[dj.id]) {
          if (data[dj.id].photos) dj.photos = data[dj.id].photos.map((p, i) => p || dj.photos[i]);
          if (data[dj.id].gallery) dj.gallery = data[dj.id].gallery;
        }
      });
    } catch (e) {}
  }

  const iMail = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 4 10 9 10-9"/></svg>`;
  const iPhone = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.7 12.14 19.79 19.79 0 0 1 1.63 3.56 2 2 0 0 1 3.6 1.37h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6.09 6.09l.91-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`;
  const iIG = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>`;
  const iSC = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M21 2H3l7 9.46V19l4 2v-9.54L21 2z"/></svg>`;
  const iPhoto = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M9 5V3h6v2"/></svg>`;

  async function uploadToCloudinary(file) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', CLOUDINARY_PRESET);
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
      method: 'POST', body: formData
    });
    const data = await res.json();
    if (!data.secure_url) throw new Error(data.error?.message || 'Upload mislukt');
    return data.secure_url;
  }

  async function handleHeroUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    try {
      const url = await uploadToCloudinary(file);
      heroPhoto = url;
      updateHeroImage();
      await saveToJsonbin();
    } catch (e) { alert('Upload mislukt.'); }
  }

  function triggerUpload(djId, index) {
    if (!adminUnlocked) return;
    document.getElementById(`file-${djId}-${index}`).click();
  }

  function triggerGalleryUpload(djId, index) {
    if (!adminUnlocked) return;
    document.getElementById(`gfile-${djId}-${index}`).click();
  }

  async function handlePhoto(djId, index, event) {
    const file = event.target.files[0];
    if (!file) return;
    const slot = document.getElementById(`slot-${djId}-${index}`);
    slot.insertAdjacentHTML('beforeend', `<div class="uploading-overlay">Uploaden...</div>`);
    try {
      const url = await uploadToCloudinary(file);
      djs.find(d => d.id === djId).photos[index] = url;
      await saveToJsonbin();
      renderDetail(djId);
      renderGrid();
    } catch (e) {
      alert('Upload mislukt.');
      slot.querySelector('.uploading-overlay')?.remove();
    }
  }

  async function handleGalleryPhoto(djId, index, event) {
    const file = event.target.files[0];
    if (!file) return;
    const slot = document.getElementById(`gslot-${djId}-${index}`);
    slot.insertAdjacentHTML('beforeend', `<div class="uploading-overlay">Uploaden...</div>`);
    try {
      const url = await uploadToCloudinary(file);
      djs.find(d => d.id === djId).gallery[index] = url;
      await saveToJsonbin();
      renderDetail(djId);
    } catch (e) {
      alert('Upload mislukt.');
      slot.querySelector('.uploading-overlay')?.remove();
    }
  }

  function photoSlotHTML(djId, index, isMain) {
    const dj = djs.find(d => d.id === djId);
    const photo = dj.photos[index];
    const adminClass = adminUnlocked ? ' admin' : '';
    return `
      <div class="photo-slot${isMain ? ' photo-main' : ''}${adminClass}" id="slot-${djId}-${index}" onclick="triggerUpload('${djId}', ${index})">
        ${photo ? `<img src="${photo}" alt="Foto ${index + 1}">` : `${iPhoto}<span>${isMain ? 'Hoofdfoto' : 'Foto ' + (index + 1)}</span>`}
        <div class="upload-overlay"></div>
        <input type="file" accept="image/*" id="file-${djId}-${index}" onchange="handlePhoto('${djId}', ${index}, event)">
      </div>`;
  }

  function galleryHTML(djId) {
    const dj = djs.find(d => d.id === djId);
    const filledCount = dj.gallery.filter(Boolean).length;
    const adminClass = adminUnlocked ? ' admin' : '';
    return `
      <div class="gallery-section" id="gallery-${djId}">
        <div class="gallery-toggle" onclick="toggleGallery('${djId}')">
          <div class="gallery-toggle-left">
            <h3>In the moment</h3>
            <span>${filledCount} / 6 foto's</span>
          </div>
          <div class="gallery-toggle-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke-width="2">
              <line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/>
            </svg>
          </div>
        </div>
        <div class="gallery-panel">
          <div class="gallery-inner">
            ${dj.gallery.map((photo, i) => `
              <div class="gallery-slot${adminClass}" id="gslot-${djId}-${i}" onclick="triggerGalleryUpload('${djId}', ${i})">
                ${photo ? `<img src="${photo}" alt="Galerij foto ${i + 1}">` : `${iPhoto}<span>Foto ${i + 1}</span>`}
                <div class="upload-overlay"></div>
                <input type="file" accept="image/*" id="gfile-${djId}-${i}" onchange="handleGalleryPhoto('${djId}', ${i}, event)">
              </div>
            `).join('')}
          </div>
        </div>
      </div>`;
  }

  function toggleGallery(djId) {
    document.getElementById(`gallery-${djId}`).classList.toggle('open');
  }

  function renderGrid() {
    document.getElementById('dj-grid').innerHTML = djs.map(dj => `
      <div class="dj-card" onclick="openDJ('${dj.id}')">
        <div class="dj-photo">
          ${dj.photos[0] ? `<img src="${dj.photos[0]}" alt="${dj.name}">` : `<div class="photo-placeholder">${iPhoto}<span>Foto</span></div>`}
        </div>
        <div class="dj-card-body">
          <div class="dj-num">${dj.number}</div>
          <h2>${dj.name}</h2>
          <div class="dj-genre">${dj.genre}</div>
          <p class="dj-bio-short">${dj.bio}</p>
          <div class="dj-tags">${dj.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          <button class="open-btn">
            Bekijk profiel
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    `).join('');
  }

  function renderDetail(id) {
    currentDJId = id;
    const dj = djs.find(d => d.id === id);
    document.getElementById('breadcrumb-name').textContent = dj.name;
    document.getElementById('detail-content').innerHTML = `
      <div class="detail-top">
        <div class="photo-grid">
          ${photoSlotHTML(dj.id, 0, true)}
          ${photoSlotHTML(dj.id, 1, false)}
          ${photoSlotHTML(dj.id, 2, false)}
        </div>
        <div class="detail-info">
          <div class="dj-num">${dj.number}</div>
          <h2>${dj.name}</h2>
          <div class="detail-genre">${dj.genre}</div>
          <p class="detail-bio">${dj.bio}</p>
          <div class="dj-tags">${dj.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          <div class="booking-block">
            <h3>Booking</h3>
            <p>${dj.bookingInfo}</p>
            <a class="booking-btn" href="mailto:${dj.email}">Boek nu →</a>
          </div>
        </div>
      </div>
      <div class="contact-grid">
        <div class="contact-col">
          <h3>Contact</h3>
          <a class="contact-item" href="mailto:${dj.email}">${iMail} ${dj.email}</a>
          <a class="contact-item" href="tel:${dj.phone.replace(/\s/g,'')}">${iPhone} ${dj.phone}</a>
        </div>
        <div class="contact-col">
          <h3>Socials</h3>
          <a class="contact-item" href="#">${iIG} ${dj.instagram}</a>
          <a class="contact-item" href="#">${iSC} SoundCloud: ${dj.soundcloud}</a>
        </div>
      </div>
      ${galleryHTML(dj.id)}
    `;
  }

  function openDJ(id) {
    renderDetail(id);
    document.getElementById('page-home').classList.remove('active');
    document.getElementById('page-detail').classList.add('active');
    window.scrollTo(0, 0);
  }

  function goHome() {
    currentDJId = null;
    document.getElementById('page-detail').classList.remove('active');
    document.getElementById('page-home').classList.add('active');
    window.scrollTo(0, 0);
  }

  async function init() {
    await loadFromJsonbin();
    updateHeroImage();
    renderGrid();
    document.getElementById('loader').classList.add('hidden');
  }

  init();
</script>

</body>
</html>
